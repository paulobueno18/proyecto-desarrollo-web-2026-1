<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./flex.css">
</head>
<body>
    <div class ="box">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
    </div>
    <hr>
    <div class ="shrink">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
    </div>
    <div class="flex-inicio">
        <div>a</div>
        <div>b</div>
        <div>c</div>
        <div>d</div>
    <hr>
    </div>
        <div class="flex-final">
        <div>a</div>
        <div>b</div>
        <div>c</div>
        <div>d</div>
    </div>
</hr>
   </div>
        <div class="flex-central">
        <div>a</div>
        <div>b</div>
        <div>c</div>
        <div>d</div>
    </div>
    <hr>
       </div>
        <div class="flex-between">
        <div>a</div>
        <div>b</div>
        <div>c</div>
        <div>d</div>
    </div>
        <hr>
       </div>
        <div class="flex-around">
        <div>a</div>
        <div>b</div>
        <div>c</div>
        <div>d</div>
    </div>
    <hr>
       </div>
        <div class="flex-between">
        <div>a</div>
        <div>b</div>
        <div>c</div>
        <div>d</div>
    </div>

</body>
</html>
